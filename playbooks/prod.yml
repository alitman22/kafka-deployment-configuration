---
- name: Production Kafka stack on Ubuntu 22.04
  hosts: all
  gather_facts: true
  become: true
  pre_tasks:
    - name: Ensure OS is Ubuntu 22.04
      ansible.builtin.assert:
        that:
          - ansible_distribution == 'Ubuntu'
          - ansible_distribution_version is version('22.04', '>=')
        fail_msg: "This playbook supports Ubuntu 22.04+ only."

    - name: Ensure required vault variables are provided for production security
      ansible.builtin.assert:
        that:
          - vault_kafka_ssl_keystore_password is defined
          - vault_kafka_ssl_key_password is defined
          - vault_kafka_ssl_truststore_password is defined
          - vault_kafka_sasl_interbroker_password is defined
          - vault_kafka_sasl_admin_password is defined
          - vault_kafka_sasl_appclient_password is defined
        fail_msg: >-
          Missing required vault variables. Create/encrypt
          inventories/prod/group_vars/vault.yml from
          inventories/prod/group_vars/vault.example.yml.
      when:
        - kafka_security_enabled | bool

- name: Configure baseline components
  hosts: all
  gather_facts: true
  become: true
  roles:
    - role: common
    - role: chrony
    - role: firewall_acl
    - role: node_exporter

- name: Install and configure Zookeeper ensemble
  hosts: zookeeper
  gather_facts: true
  become: true
  roles:
    - role: zookeeper

- name: Install and configure Kafka brokers
  hosts: kafka
  gather_facts: true
  become: true
  roles:
    - role: kafka_pki
    - role: kafka_security
    - role: jmx_exporter
    - role: kafka

- name: Install Redpanda Console
  hosts: console
  gather_facts: true
  become: true
  roles:
    - role: redpanda_console

- name: Generate pfSense NAT change bundle
  hosts: pfsense_docs
  gather_facts: false
  connection: local
  roles:
    - role: pfsense_nat
