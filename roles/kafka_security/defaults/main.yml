---
kafka_security_enabled: true
kafka_security_mode: sasl_ssl

kafka_ssl_keystore_location: /etc/kafka/secrets/kafka.server.keystore.jks
kafka_ssl_keystore_password: changeit
kafka_ssl_key_password: changeit
kafka_ssl_truststore_location: /etc/kafka/secrets/kafka.server.truststore.jks
kafka_ssl_truststore_password: changeit
kafka_ssl_client_auth: "{{ 'required' if kafka_security_mode == 'mtls' else 'none' }}"

kafka_sasl_mechanism: PLAIN
kafka_sasl_inter_broker_mechanism: PLAIN
kafka_sasl_interbroker_username: broker
kafka_sasl_interbroker_password: broker-secret-change-me
kafka_sasl_admin_username: admin
kafka_sasl_admin_password: admin-secret-change-me
kafka_sasl_client_users:
  - username: appclient
    password: appclient-secret-change-me

kafka_acl_enable: true
kafka_super_users:
  - "User:{{ kafka_sasl_admin_username }}"
  - "User:{{ kafka_sasl_interbroker_username }}"

kafka_security_jaas_path: /etc/kafka/kafka_server_jaas.conf
