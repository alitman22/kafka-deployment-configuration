---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - gnupg
      - ca-certificates
      - tar
      - unzip
      - jq
      - net-tools
      - "{{ java_package }}"
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
