---
- name: Install docker engine and compose plugin
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-plugin
      - python3-docker
    state: present
    update_cache: true

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Create monitoring project directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - "{{ prometheus_grafana_project_dir }}"
    - "{{ prometheus_grafana_project_dir }}/prometheus"

- name: Render production prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_grafana_project_dir }}/prometheus/prometheus.yml"
    owner: root
    group: root
    mode: '0644'

- name: Render production monitoring compose file
  ansible.builtin.template:
    src: docker-compose.monitoring.yml.j2
    dest: "{{ prometheus_grafana_project_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'

- name: Start Prometheus and Grafana monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ prometheus_grafana_project_dir }}"
    state: present
    pull: always
